<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>護膚花園 - 管理後台 (雲端同步版)</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #d4e8cf; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fffcf0; border-radius: 40px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h1 { color: #4c6e2c; border-bottom: 2px solid #e2cfaa; padding-bottom: 8px; }
        .section { background: #fff8eb; border-radius: 28px; padding: 20px; margin-bottom: 24px; }
        .flex { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
        .field { flex: 1; min-width: 150px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; color: #5a4a2e; }
        input, select, textarea { width: 100%; padding: 8px 12px; border-radius: 60px; border: 1px solid #c9aa6f; background: white; }
        button { background: #7ca85a; color: white; border: none; padding: 8px 20px; border-radius: 60px; cursor: pointer; font-weight: bold; margin-top: 8px; margin-right: 8px; }
        button:hover { background: #6b934d; }
        .btn-cloud { background: #2196f3; }
        .btn-danger { background: #c73f1e; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; margin-top: 12px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #e9dbbd; }
        .msg { margin-top: 16px; padding: 10px; border-radius: 30px; text-align: center; background: #e6ddb3; }
        .success { background: #c8e6c9; color: #2e7d32; }
        .error { background: #ffcdd2; color: #c62828; }
        .loading { background: #fff3e0; color: #e65100; }
    </style>
</head>
<body>
<div class="container">
    <h1>🌸 護膚花園・管理後台 <span style="font-size:0.8rem;">(雲端同步版)</span></h1>
    <p>所有設定會自動同步到雲端，玩家遊戲頁面會自動讀取最新設定。</p>

    <div class="section">
        <h3>☁️ 雲端同步</h3>
        <button id="syncToCloudBtn" class="btn-cloud">📤 上傳到雲端 (儲存所有設定)</button>
        <button id="syncFromCloudBtn" class="btn-cloud">📥 從雲端下載 (讀取最新設定)</button>
        <span id="cloudStatus" style="margin-left:12px;"></span>
    </div>

    <div class="section">
        <h3>🎨 植物外觀</h3>
        <div class="flex">
            <div class="field"><label>🌿 莖顏色</label><input type="color" id="stemColor" value="#5a8f4c"></div>
            <div class="field"><label>🍃 葉顏色</label><input type="color" id="leafColor" value="#6fbf4c"></div>
            <div class="field"><label>🌸 花主色</label><input type="color" id="flowerColor" value="#ffaa88"></div>
            <div class="field"><label>📍 花蕊色</label><input type="color" id="stamenColor" value="#dd8844"></div>
        </div>
        <div class="flex">
            <div class="field"><label>🌱 花種</label>
                <select id="flowerType">
                    <option value="rose">🌹 玫瑰</option>
                    <option value="cherry">🌸 櫻花</option>
                    <option value="sunflower">🌻 向日葵</option>
                    <option value="lotus">🪷 蓮花</option>
                </select>
            </div>
            <div class="field"><label>🍂 飄落數量</label><input type="number" id="petalCount" value="10"></div>
            <div class="field"><label>🌬️ 飄落速度</label><input type="range" id="fallSpeed" min="0.5" max="2.5" step="0.1" value="1.2"></div>
        </div>
        <button id="saveAppearanceBtn">💾 儲存外觀設定 (本地)</button>
    </div>

    <div class="section">
        <h3>⚙️ 遊戲規則</h3>
        <div class="flex">
            <div class="field"><label>🌸 開花門檻 (水滴)</label><input type="number" id="targetWater" value="660"></div>
            <div class="field"><label>💧 日常澆水給水</label><input type="number" id="dailyWater" value="20"></div>
            <div class="field"><label>📖 答題給水</label><input type="number" id="quizReward" value="50"></div>
            <div class="field"><label>🎁 兌換券連結</label><input type="url" id="giftLink" value="https://lin.ee/example"></div>
        </div>
        <div class="flex">
            <div class="field"><label>🏷️ 遊戲名稱</label><input type="text" id="gameName" value="🌸 護膚花園" placeholder="遊戲標題"></div>
        </div>
        <button id="saveRulesBtn">💾 儲存遊戲規則 (本地)</button>
    </div>

    <div class="section">
        <h3>📚 題庫管理 (JSON格式)</h3>
        <textarea id="questionsEditor" rows="8" style="width:100%; border-radius:20px; font-family:monospace;"></textarea>
        <button id="saveQuestionsBtn">📖 儲存題庫 (本地)</button>
        <button id="resetDefaultBtn">↺ 重置預設題庫</button>
    </div>

    <div class="section">
        <h3>📋 玩家進度 (此瀏覽器)</h3>
        <div style="overflow-x:auto;"><table id="playerTable"><thead><tr><th>LINE ID</th><th>水滴量</th><th>開花狀態</th><th>領取次數</th><th>最後領取</th></thead><tbody id="playerTbody"></tbody>}</div>
        <div class="flex" style="margin-top:12px;">
            <select id="playerSelect" style="flex:2;"></select>
            <input type="number" id="addWaterAmount" placeholder="增加水滴" style="flex:1;">
            <button id="addWaterBtn">💧 增加水滴</button>
            <button id="resetPlayerBtn">♻️ 重置該玩家</button>
        </div>
    </div>

    <div class="section">
        <h3>📦 備份與還原</h3>
        <button id="exportBtn">📥 匯出所有設定與玩家資料</button>
        <input type="file" id="importFile" accept=".json" style="display:none;">
        <button id="importBtn">📤 匯入備份還原</button>
        <button id="clearAllBtn" class="btn-danger">⚠️ 清除所有資料 (重置)</button>
    </div>

    <div id="msgBox" class="msg">就緒</div>
</div>

<script>
    // ========== 雲端同步網址 (請使用您的 Apps Script 網址) ==========
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzqmnvjeRC11bkBH4sHq_zpXkFQi8gF4HxtWPzg-pzuwdhzqoCU2JJxkwP-QeUD5b4jaw/exec";

    // 儲存用的 key
    const CONFIG_KEY = "flower_admin_config";
    const PLAYERS_KEY = "flower_advanced_players";

    // 預設題庫
    const DEFAULT_QUESTIONS = [
        { text: "旅行時肌膚容易乾燥，哪種保養品最適合隨身攜帶？", options: ["保濕噴霧", "卸妝油", "磨砂膏", "A醇精華"], correct: 0 },
        { text: "搭飛機時，機艙乾燥，護膚重點是什麼？", options: ["加強保濕鎖水", "去角質", "使用高濃度酸類", "完全不保養"], correct: 0 },
        { text: "吃太多甜食可能導致肌膚哪種問題？", options: ["糖化反應膠原蛋白流失", "變白", "減少出油", "毛孔縮小"], correct: 0 },
        { text: "日常防曬最主要的目的？", options: ["防止光老化與皮膚癌", "防止出油", "防止痘痘", "保濕"], correct: 0 },
        { text: "抗老明星成分A醇(Retinol)使用注意事項？", options: ["需建立耐受並夜間使用", "早上使用效果佳", "可與高濃度酸類疊加", "孕婦安心用"], correct: 0 }
    ];

    // 初始化設定
    let adminConfig = {
        appearance: { stemColor: "#5a8f4c", leafColor: "#6fbf4c", flowerColor: "#ffaa88", stamenColor: "#dd8844", flowerType: "rose", petalCount: 10, fallSpeed: 1.2 },
        rules: { targetWater: 660, dailyWaterAmount: 20, quizRewardAmount: 50, giftCouponLink: "https://lin.ee/example", gameName: "🌸 護膚花園" },
        questions: JSON.parse(JSON.stringify(DEFAULT_QUESTIONS))
    };

    let playersMap = new Map();

    // ---- 本地儲存 ----
    function saveAll() {
        const toSave = {
            config: adminConfig,
            players: Array.from(playersMap.entries())
        };
        localStorage.setItem(CONFIG_KEY, JSON.stringify(toSave));
        const playerObj = {};
        for (let [id, data] of playersMap.entries()) playerObj[id] = data;
        localStorage.setItem(PLAYERS_KEY, JSON.stringify(playerObj));
        showMsg("✅ 已儲存至本機", "success");
    }

    function loadAll() {
        const raw = localStorage.getItem(CONFIG_KEY);
        if (raw) {
            try {
                const data = JSON.parse(raw);
                if (data.config) adminConfig = data.config;
                if (data.players) playersMap = new Map(data.players);
            } catch(e) { console.warn(e); }
        }
        // 補齊預設
        if (!adminConfig.questions || adminConfig.questions.length === 0) adminConfig.questions = [...DEFAULT_QUESTIONS];
        if (!adminConfig.appearance) adminConfig.appearance = { stemColor: "#5a8f4c", leafColor: "#6fbf4c", flowerColor: "#ffaa88", stamenColor: "#dd8844", flowerType: "rose", petalCount: 10, fallSpeed: 1.2 };
        if (!adminConfig.rules) adminConfig.rules = { targetWater: 660, dailyWaterAmount: 20, quizRewardAmount: 50, giftCouponLink: "https://lin.ee/example", gameName: "🌸 護膚花園" };
        if (!adminConfig.rules.gameName) adminConfig.rules.gameName = "🌸 護膚花園";

        // 同步到 UI
        const a = adminConfig.appearance;
        document.getElementById('stemColor').value = a.stemColor;
        document.getElementById('leafColor').value = a.leafColor;
        document.getElementById('flowerColor').value = a.flowerColor;
        document.getElementById('stamenColor').value = a.stamenColor;
        document.getElementById('flowerType').value = a.flowerType;
        document.getElementById('petalCount').value = a.petalCount;
        document.getElementById('fallSpeed').value = a.fallSpeed;

        const r = adminConfig.rules;
        document.getElementById('targetWater').value = r.targetWater;
        document.getElementById('dailyWater').value = r.dailyWaterAmount;
        document.getElementById('quizReward').value = r.quizRewardAmount;
        document.getElementById('giftLink').value = r.giftCouponLink;
        document.getElementById('gameName').value = r.gameName;

        document.getElementById('questionsEditor').value = JSON.stringify(adminConfig.questions, null, 2);
        renderPlayerTable();
        showMsg("📀 本地資料載入完成", "success");
    }

    function renderPlayerTable() {
        const tbody = document.getElementById('playerTbody');
        const select = document.getElementById('playerSelect');
        tbody.innerHTML = "";
        select.innerHTML = '<option value="">-- 選擇玩家 --</option>';
        for (let [id, data] of playersMap.entries()) {
            const lastClaim = data.claimHistory?.length ? data.claimHistory[data.claimHistory.length-1].date : "無";
            const row = `<tr><td title="${id}">${id.substring(0,16)}...</td><td>${data.water || 0}</td><td>${data.hasBloomed ? '🌸 開花' : '🌱 未開花'}</td><td>${data.totalClaims || 0}</td><td>${lastClaim}</td></tr>`;
            tbody.innerHTML += row;
            const option = document.createElement('option');
            option.value = id;
            option.textContent = `${id.substring(0,12)}... (${data.water || 0}滴)`;
            select.appendChild(option);
        }
        if(playersMap.size === 0) tbody.innerHTML = '<tr><td colspan="5">尚無玩家，請透過遊戲頁面登入LINE綁定</td></tr>';
    }

    function showMsg(msg, type = "info") {
        const box = document.getElementById('msgBox');
        box.textContent = msg;
        box.className = `msg ${type === "success" ? "success" : (type === "error" ? "error" : type === "loading" ? "loading" : "")}`;
        setTimeout(() => { if(box.textContent === msg) box.textContent = "就緒"; box.className = "msg"; }, 3000);
    }

    // ========== 雲端同步函數 ==========
    async function uploadToCloud() {
        showMsg("☁️ 正在上傳到雲端...", "loading");
        const payload = {
            type: "UPDATE_CONFIG",
            config: {
                targetWater: adminConfig.rules.targetWater,
                dailyWaterAmount: adminConfig.rules.dailyWaterAmount,
                quizRewardAmount: adminConfig.rules.quizRewardAmount,
                giftCouponLink: adminConfig.rules.giftCouponLink,
                gameName: adminConfig.rules.gameName,
                stemColor: adminConfig.appearance.stemColor,
                leafColor: adminConfig.appearance.leafColor,
                flowerColor: adminConfig.appearance.flowerColor,
                stamenColor: adminConfig.appearance.stamenColor,
                flowerType: adminConfig.appearance.flowerType,
                petalCount: adminConfig.appearance.petalCount,
                fallSpeed: adminConfig.appearance.fallSpeed,
                questions: adminConfig.questions
            },
            players: Array.from(playersMap.entries()).map(([id, data]) => ({
                userId: id,
                water: data.water,
                hasBloomed: data.hasBloomed,
                lastDailyDate: data.lastDailyDate || "",
                totalClaims: data.totalClaims || 0,
                lastClaimDate: data.claimHistory?.length ? data.claimHistory[data.claimHistory.length-1].date : ""
            }))
        };
        try {
            await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            showMsg("✅ 已上傳至雲端！玩家遊戲頁面將會讀取新設定", "success");
        } catch(e) {
            showMsg("⚠️ 上傳失敗，請檢查網路", "error");
        }
    }

    async function downloadFromCloud() {
        showMsg("☁️ 正在從雲端下載...", "loading");
        try {
            const res = await fetch(CLOUD_URL);
            const cloudData = await res.json();
            if(cloudData.config) {
                if(cloudData.config.targetWater) adminConfig.rules.targetWater = cloudData.config.targetWater;
                if(cloudData.config.dailyWaterAmount) adminConfig.rules.dailyWaterAmount = cloudData.config.dailyWaterAmount;
                if(cloudData.config.quizRewardAmount) adminConfig.rules.quizRewardAmount = cloudData.config.quizRewardAmount;
                if(cloudData.config.giftCouponLink) adminConfig.rules.giftCouponLink = cloudData.config.giftCouponLink;
                if(cloudData.config.gameName) adminConfig.rules.gameName = cloudData.config.gameName;
                if(cloudData.config.stemColor) adminConfig.appearance.stemColor = cloudData.config.stemColor;
                if(cloudData.config.leafColor) adminConfig.appearance.leafColor = cloudData.config.leafColor;
                if(cloudData.config.flowerColor) adminConfig.appearance.flowerColor = cloudData.config.flowerColor;
                if(cloudData.config.stamenColor) adminConfig.appearance.stamenColor = cloudData.config.stamenColor;
                if(cloudData.config.flowerType) adminConfig.appearance.flowerType = cloudData.config.flowerType;
                if(cloudData.config.petalCount) adminConfig.appearance.petalCount = cloudData.config.petalCount;
                if(cloudData.config.fallSpeed) adminConfig.appearance.fallSpeed = cloudData.config.fallSpeed;
                if(cloudData.config.questions && cloudData.config.questions.length) adminConfig.questions = cloudData.config.questions;
            }
            if(cloudData.players && cloudData.players.length) {
                playersMap.clear();
                for(let p of cloudData.players) {
                    playersMap.set(p.userId, {
                        water: p.water,
                        hasBloomed: p.hasBloomed,
                        lastDailyDate: p.lastDailyDate,
                        claimHistory: p.lastClaimDate ? [{date: p.lastClaimDate}] : [],
                        totalClaims: p.totalClaims || 0
                    });
                }
            }
            // 更新 UI
            const a = adminConfig.appearance;
            document.getElementById('stemColor').value = a.stemColor;
            document.getElementById('leafColor').value = a.leafColor;
            document.getElementById('flowerColor').value = a.flowerColor;
            document.getElementById('stamenColor').value = a.stamenColor;
            document.getElementById('flowerType').value = a.flowerType;
            document.getElementById('petalCount').value = a.petalCount;
            document.getElementById('fallSpeed').value = a.fallSpeed;
            const r = adminConfig.rules;
            document.getElementById('targetWater').value = r.targetWater;
            document.getElementById('dailyWater').value = r.dailyWaterAmount;
            document.getElementById('quizReward').value = r.quizRewardAmount;
            document.getElementById('giftLink').value = r.giftCouponLink;
            document.getElementById('gameName').value = r.gameName;
            document.getElementById('questionsEditor').value = JSON.stringify(adminConfig.questions, null, 2);
            renderPlayerTable();
            saveAll();
            showMsg("✅ 已從雲端同步最新設定！", "success");
        } catch(e) {
            showMsg("⚠️ 雲端下載失敗，請檢查網路後重試", "error");
        }
    }

    // ---- 儲存動作 (本地) ----
    function saveAppearance() {
        adminConfig.appearance = {
            stemColor: document.getElementById('stemColor').value,
            leafColor: document.getElementById('leafColor').value,
            flowerColor: document.getElementById('flowerColor').value,
            stamenColor: document.getElementById('stamenColor').value,
            flowerType: document.getElementById('flowerType').value,
            petalCount: parseInt(document.getElementById('petalCount').value),
            fallSpeed: parseFloat(document.getElementById('fallSpeed').value)
        };
        saveAll();
    }

    function saveRules() {
        adminConfig.rules = {
            targetWater: parseInt(document.getElementById('targetWater').value),
            dailyWaterAmount: parseInt(document.getElementById('dailyWater').value),
            quizRewardAmount: parseInt(document.getElementById('quizReward').value),
            giftCouponLink: document.getElementById('giftLink').value,
            gameName: document.getElementById('gameName').value
        };
        saveAll();
    }

    function saveQuestions() {
        try {
            const q = JSON.parse(document.getElementById('questionsEditor').value);
            if(Array.isArray(q) && q.length) {
                adminConfig.questions = q;
                saveAll();
            } else throw new Error();
        } catch(e) { showMsg("❌ JSON 格式錯誤，請檢查", "error"); }
    }

    function resetDefaultQuestions() {
        adminConfig.questions = JSON.parse(JSON.stringify(DEFAULT_QUESTIONS));
        document.getElementById('questionsEditor').value = JSON.stringify(adminConfig.questions, null, 2);
        saveAll();
    }

    function addWaterToPlayer() {
        const playerId = document.getElementById('playerSelect').value;
        if(!playerId) { showMsg("請選擇玩家", "error"); return; }
        const addVal = parseInt(document.getElementById('addWaterAmount').value);
        if(isNaN(addVal) || addVal <= 0) { showMsg("請輸入有效的水滴數量", "error"); return; }
        const player = playersMap.get(playerId);
        if(player.hasBloomed) { showMsg("玩家已開花，請先讓玩家重新栽種", "error"); return; }
        player.water = (player.water || 0) + addVal;
        if(player.water >= adminConfig.rules.targetWater) {
            player.water = adminConfig.rules.targetWater;
            player.hasBloomed = true;
        }
        saveAll();
        renderPlayerTable();
        showMsg(`✅ 已增加 ${addVal} 滴，目前水量 ${player.water}`);
    }

    function resetPlayer() {
        const playerId = document.getElementById('playerSelect').value;
        if(!playerId) { showMsg("請選擇玩家", "error"); return; }
        if(confirm(`確定重置玩家 ${playerId.substring(0,12)} 的所有進度？`)) {
            playersMap.delete(playerId);
            saveAll();
            renderPlayerTable();
            showMsg(`✅ 玩家已重置`);
        }
    }

    function exportData() {
        const exportObj = { config: adminConfig, players: Array.from(playersMap.entries()) };
        const blob = new Blob([JSON.stringify(exportObj, null, 2)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `flower_backup_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showMsg("📥 備份已匯出", "success");
    }

    function importData(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if(data.config) adminConfig = data.config;
                if(data.players) playersMap = new Map(data.players);
                saveAll();
                loadAll();
                showMsg("✅ 還原成功！", "success");
            } catch(err) { showMsg("❌ 還原失敗，檔案格式錯誤", "error"); }
        };
        reader.readAsText(file);
    }

    function clearAllData() {
        if(confirm("⚠️ 這將會清除所有玩家資料與設定，確定嗎？")) {
            localStorage.removeItem(CONFIG_KEY);
            localStorage.removeItem(PLAYERS_KEY);
            adminConfig = {
                appearance: { stemColor: "#5a8f4c", leafColor: "#6fbf4c", flowerColor: "#ffaa88", stamenColor: "#dd8844", flowerType: "rose", petalCount: 10, fallSpeed: 1.2 },
                rules: { targetWater: 660, dailyWaterAmount: 20, quizRewardAmount: 50, giftCouponLink: "https://lin.ee/example", gameName: "🌸 護膚花園" },
                questions: JSON.parse(JSON.stringify(DEFAULT_QUESTIONS))
            };
            playersMap.clear();
            saveAll();
            loadAll();
            showMsg("🔄 所有資料已重置", "success");
        }
    }

    // 事件綁定
    document.getElementById('syncToCloudBtn').addEventListener('click', uploadToCloud);
    document.getElementById('syncFromCloudBtn').addEventListener('click', downloadFromCloud);
    document.getElementById('saveAppearanceBtn').addEventListener('click', saveAppearance);
    document.getElementById('saveRulesBtn').addEventListener('click', saveRules);
    document.getElementById('saveQuestionsBtn').addEventListener('click', saveQuestions);
    document.getElementById('resetDefaultBtn').addEventListener('click', resetDefaultQuestions);
    document.getElementById('addWaterBtn').addEventListener('click', addWaterToPlayer);
    document.getElementById('resetPlayerBtn').addEventListener('click', resetPlayer);
    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', (e) => { if(e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; });
    document.getElementById('clearAllBtn').addEventListener('click', clearAllData);

    loadAll();
</script>
</body>
</html>
