<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>護膚花園 - 管理後台</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #d4e8cf; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: #fffcf0; border-radius: 40px; padding: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .admin-title { font-size: 1.5rem; font-weight: bold; color: #4c6e2c; margin-bottom: 15px; border-bottom: 2px solid #e2cfaa; }
        .admin-section { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed #ccc; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        label { font-weight: 600; display: block; margin-bottom: 5px; }
        input, textarea, select { padding: 8px; border-radius: 10px; border: 1px solid #c9aa6f; width: 100%; }
        .admin-btn { background: #7ca85a; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 5px; }
        .admin-btn:hover { background: #6b934d; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: left; }
        th { background: #f9f4e8; }
        textarea { height: 120px; font-family: monospace; }
        #adminMsgBox { background: #e6ddb3; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-weight: bold; min-height: 40px; }
    </style>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="admin-container">
    <div class="admin-title">🌸 護膚花園・管理中心</div>
    <div id="adminMsgBox">系統準備中...</div>

    <div class="admin-section">
        <div class="admin-title" style="font-size:1.1rem;">🎨 外觀與顏色設定</div>
        <div class="flex-row">
            <div style="flex:1"><label>🌿 莖</label><input type="color" id="stemColor" value="#5a8f4c"></div>
            <div style="flex:1"><label>🍃 葉</label><input type="color" id="leafColor" value="#6fbf4c"></div>
            <div style="flex:1"><label>🌸 花</label><input type="color" id="flowerColor" value="#ffaa88"></div>
        </div>
        <button class="admin-btn" onclick="handleSaveAppearance()">儲存外觀 (本地)</button>
    </div>

    <div class="admin-section">
        <div class="admin-title" style="font-size:1.1rem;">⚙️ 遊戲規則與雲端同步</div>
        <div class="flex-row">
            <div style="flex:1"><label>🌸 目標水量</label><input type="number" id="targetWaterSetting" value="660"></div>
            <div style="flex:1"><label>💧 每日給水</label><input type="number" id="dailyWaterAmount" value="20"></div>
            <div style="flex:1"><label>📖 答題給水</label><input type="number" id="quizRewardAmount" value="50"></div>
        </div>
        <button class="admin-btn" onclick="handleSaveSettings()">儲存並同步至雲端</button>
    </div>

    <div class="admin-section">
        <div class="admin-title" style="font-size:1.1rem;">📚 護膚題庫 (JSON 格式)</div>
        <textarea id="questionsEditor"></textarea>
        <button class="admin-btn" onclick="handleUpdateQuestions()">同步題庫至雲端</button>
    </div>

    <div class="admin-section">
        <div class="admin-title" style="font-size:1.1rem;">👥 玩家清單</div>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>玩家 ID</th><th>水量</th><th>狀態</th><th>操作</th></tr></thead>
                <tbody id="playersTbody"></tbody>
            </table>
        </div>
    </div>

    <div class="admin-section">
        <div class="admin-title" style="font-size:1.1rem;">🛠️ 手動增減水量</div>
        <p>目前選取：<span id="selectedIdDisplay" style="color:red;">未選擇</span></p>
        <div class="flex-row">
            <input type="number" id="manualWaterVal" placeholder="增減值 (如 10)" style="width:150px;">
            <button class="admin-btn" onclick="handleManualAdjust()">執行調整</button>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzqmnvjeRC11bkBH4sHq_zpXkFQi8gF4HxtWPzg-pzuwdhzqoCU2JJxkwP-QeUD5b4jaw/exec";
    
    let playersMap = {};
    let gameSettings = { targetWater: 660, dailyWaterAmount: 20, quizRewardAmount: 50 };
    let selectedId = null;

    function showMsg(msg) {
        document.getElementById('adminMsgBox').innerText = msg;
    }

    async function init() {
        try {
            showMsg("🔄 正在讀取雲端資料...");
            const res = await fetch(GAS_URL);
            const data = await res.json();

            if (data.players) {
                data.players.slice(1).forEach(row => {
                    if(row[0]) playersMap[row[0]] = { water: parseFloat(row[1]) || 0 };
                });
            }

            if (data.config) {
                gameSettings = data.config;
                document.getElementById('targetWaterSetting').value = gameSettings.targetWater || 660;
                document.getElementById('dailyWaterAmount').value = gameSettings.dailyWaterAmount || 20;
                document.getElementById('quizRewardAmount').value = gameSettings.quizRewardAmount || 50;
                if(gameSettings.questions) {
                    document.getElementById('questionsEditor').value = JSON.stringify(gameSettings.questions, null, 2);
                }
            }
            renderTable();
            showMsg("✅ 資料載入完成");
        } catch(e) { showMsg("⚠️ 雲端連線失敗"); }
    }

    // --- 以下為按鈕觸發的函式 ---

    async function handleSaveSettings() {
        gameSettings.targetWater = parseInt(document.getElementById('targetWaterSetting').value);
        gameSettings.dailyWaterAmount = parseInt(document.getElementById('dailyWaterAmount').value);
        gameSettings.quizRewardAmount = parseInt(document.getElementById('quizRewardAmount').value);

        showMsg("⏳ 正在同步規則...");
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ type: 'UPDATE_CONFIG', config: gameSettings })
        });
        showMsg("✅ 雲端規則已更新！");
    }

    async function handleUpdateQuestions() {
        try {
            const newQs = JSON.parse(document.getElementById('questionsEditor').value);
            gameSettings.questions = newQs;
            showMsg("⏳ 正在更新題庫...");
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ type: 'UPDATE_CONFIG', config: gameSettings })
            });
            showMsg("✅ 題庫已成功同步！");
        } catch(e) { alert("JSON 格式不正確"); }
    }

    function handleSaveAppearance() {
        const app = {
            stemColor: document.getElementById('stemColor').value,
            leafColor: document.getElementById('leafColor').value,
            flowerColor: document.getElementById('flowerColor').value
        };
        localStorage.setItem('berji_appearance', JSON.stringify(app));
        showMsg("✅ 外觀設定已存至瀏覽器");
    }

    function renderTable() {
        const tbody = document.getElementById('playersTbody');
        tbody.innerHTML = "";
        Object.keys(playersMap).forEach(id => {
            const p = playersMap[id];
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${id.substring(0,10)}...</td>
                <td>${p.water}</td>
                <td>${p.water >= gameSettings.targetWater ? '🌸' : '🌱'}</td>
                <td><button onclick="handleSelectPlayer('${id}')">選擇</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function handleSelectPlayer(id) {
        selectedId = id;
        document.getElementById('selectedIdDisplay').innerText = id;
    }

    async function handleManualAdjust() {
        if(!selectedId) return alert("請先從清單選擇玩家");
        const val = parseFloat(document.getElementById('manualWaterVal').value) || 0;
        playersMap[selectedId].water += val;
        
        showMsg("⏳ 正在更新玩家數據...");
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                userId: selectedId,
                water: playersMap[selectedId].water,
                dailyCount: 0, // 手動調整暫不影響次數
                lastWaterTime: new Date().getTime(),
                lastResetDate: ""
            })
        });
        renderTable();
        showMsg("✅ 玩家水量已調整");
    }

    window.onload = init;
</script>
</body>
</html>
