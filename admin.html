<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>護膚花園 - 獨立管理後台</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #d4e8cf; font-family: 'Segoe UI', 'Roboto', 'Noto Sans TC', sans-serif; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: #fffcf0; border-radius: 48px; padding: 24px; box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .admin-title { font-size: 1.8rem; font-weight: bold; color: #4c6e2c; margin-bottom: 20px; border-bottom: 2px solid #e2cfaa; padding-bottom: 10px; }
        .admin-section { margin-bottom: 28px; border-bottom: 2px dashed #e2cfaa; padding-bottom: 18px; }
        .flex-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
        label { font-weight: 600; display: block; margin-bottom: 4px; }
        input, textarea, select { padding: 8px 12px; border-radius: 40px; border: 1px solid #c9aa6f; background: white; width: 100%; }
        .admin-btn { background: #7ca85a; color: white; border: none; padding: 8px 18px; border-radius: 40px; cursor: pointer; margin-top: 6px; margin-right: 8px; }
        .admin-btn-danger { background: #c73f1e; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; margin-top: 12px; }
        th, td { padding: 10px 8px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #e9dbbd; }
        .game-link-box { background: #e9e2cf; border-radius: 40px; padding: 12px; text-align: center; margin-top: 8px; word-break: break-all; }
        textarea { font-family: monospace; border-radius: 24px; }
        .player-reset-btn { background: #e0874a; border: none; border-radius: 30px; padding: 4px 12px; cursor: pointer; color: white; }
        .success-msg { background: #c8e6c9; color: #2e7d32; padding: 8px 16px; border-radius: 30px; margin-top: 10px; }
        .error-msg { background: #ffcdd2; color: #c62828; padding: 8px 16px; border-radius: 30px; margin-top: 10px; }
    </style>
    <!-- 載入 LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="liff-init.js"></script>
<script>
    // 1. 設定您的 GAS 網址 (務必確認與 index.html 相同)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzqmnvjeRC11bkBH4sHq_zpXkFQi8gF4HxtWPzg-pzuwdhzqoCU2JJxkwP-QeUD5b4jaw/exec";

    let playersMap = {};
    let gameSettings = {
        targetWater: 100,
        dailyWaterAmount: 10,
        quizWaterAmount: 5,
        growthStages: [20, 50, 80],
        plantImages: {
            seed: "https://via.placeholder.com/150?text=Seed",
            sprout: "https://via.placeholder.com/150?text=Sprout",
            growing: "https://via.placeholder.com/150?text=Growing",
            bloom: "https://via.placeholder.com/150?text=Bloom"
        }
    };
    let questions = []; // 預設題庫會由 loadAll 載入
    let selectedId = null;

    function adminMsg(t) {
        const info = document.getElementById('adminInfo');
        info.innerText = t;
        setTimeout(() => { if(info.innerText === t) info.innerText = "系統就緒"; }, 3000);
    }

    // 2. 修改：從雲端載入所有玩家與設定
    async function loadAll() {
        // 先讀取本地緩存作為基礎
        const lp = localStorage.getItem('berji_players');
        if (lp) playersMap = JSON.parse(lp);
        const ls = localStorage.getItem('berji_settings');
        if (ls) gameSettings = JSON.parse(ls);
        const lq = localStorage.getItem('berji_questions');
        if (lq) questions = JSON.parse(lq);

        try {
            adminMsg("正在同步雲端數據...");
            const response = await fetch(GAS_URL);
            const cloudData = await response.json();
            
            // 將 Google 試算表陣列轉回玩家物件
            // 欄位順序：userId, water, dailyCount, lastWaterTime, lastResetDate
            if (cloudData && cloudData.length > 1) {
                cloudData.slice(1).forEach(row => {
                    const [uid, water, count, time, reset] = row;
                    if (uid) {
                        playersMap[uid] = playersMap[uid] || { displayName: "LINE玩家", pictureUrl: "" };
                        playersMap[uid].water = parseFloat(water) || 0;
                        playersMap[uid].dailyCount = parseInt(count) || 0;
                        playersMap[uid].lastWaterTime = time;
                        playersMap[uid].lastResetDate = reset;
                    }
                });
                adminMsg("雲端資料同步成功");
            }
        } catch (e) {
            console.error("雲端讀取錯誤:", e);
            adminMsg("雲端連線失敗，改顯示本地備份");
        }

        renderAdminTable();
        updatePlayerSelect();
    }

    // 3. 修改：資料同步函式
    async function persistAll() {
        localStorage.setItem('berji_players', JSON.stringify(playersMap));
        localStorage.setItem('berji_settings', JSON.stringify(gameSettings));
        localStorage.setItem('berji_questions', JSON.stringify(questions));

        // 如果後台有選擇特定玩家進行手動修改，則同步回雲端
        if (selectedId && playersMap[selectedId]) {
            const p = playersMap[selectedId];
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        userId: selectedId,
                        water: p.water,
                        dailyCount: p.dailyCount,
                        lastWaterTime: p.lastWaterTime,
                        lastResetDate: p.lastResetDate
                    })
                });
            } catch (e) { console.error("後台同步雲端失敗"); }
        }
    }

    function renderAdminTable() {
        const tbody = document.querySelector('#playerTable tbody');
        tbody.innerHTML = "";
        Object.keys(playersMap).forEach(id => {
            const p = playersMap[id];
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><img src="${p.pictureUrl || ''}" width="30" style="border-radius:50%"> ${p.displayName || '未登入'}</td>
                <td>${id}</td>
                <td>${p.water.toFixed(1)} / ${gameSettings.targetWater}</td>
                <td>${p.dailyCount || 0} / 3</td>
                <td><button class="admin-btn" onclick="selectPlayer('${id}')">管理</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function selectPlayer(id) {
        selectedId = id;
        const p = playersMap[id];
        document.getElementById('selectedPlayerName').innerText = p.displayName || id;
        adminMsg(`已選擇玩家: ${p.displayName || id}`);
    }

    // 手動加水功能
    async function addWaterToPlayer() {
        if (!selectedId) { alert("請先從表格選擇玩家"); return; }
        const addVal = parseFloat(document.getElementById('manualWaterAmount').value) || 0;
        playersMap[selectedId].water += addVal;
        
        await persistAll(); // 存檔並同步雲端
        renderAdminTable();
        adminMsg(`成功為玩家手動增加 ${addVal} 滴水`);
    }

    // 其餘原本的設定儲存功能 (saveSettings, updateQuestions 等) 請保留原本邏輯，只需在結尾呼叫 persistAll() 即可。
    
    // 初始化
    window.onload = loadAll;
</script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="admin-container">
    <div class="admin-title">🌸 護膚花園・獨立管理後台</div>
    
    <div class="admin-section">
        <div class="admin-title" style="font-size:1.2rem;">🔗 玩家遊戲連結</div>
        <div class="game-link-box">
            <a href="#" id="fixedGameLink" target="_blank">https://berji2025.github.io/berjizh/</a>
            <button id="copyLinkBtn" class="admin-btn">📋 複製連結</button>
        </div>
        <div class="game-link-box" style="margin-top:8px; background:#f0e8d8;">
            🔐 LIFF 網址：<strong>https://liff.line.me/2009794956-63RNhOU2</strong>
        </div>
    </div>

    <div class="admin-section">
        <div class="admin-title" style="font-size:1.2rem;">🎨 植物外觀設定</div>
        <div class="flex-row">
            <div style="flex:1"><label>🌿 莖顏色</label><input type="color" id="stemColor" value="#5a8f4c"></div>
            <div style="flex:1"><label>🍃 葉子顏色</label><input type="color" id="leafColor" value="#6fbf4c"></div>
            <div style="flex:1"><label>🌸 花朵主色</label><input type="color" id="flowerColor" value="#ffaa88"></div>
            <div style="flex:1"><label>🌸 花蕊顏色</label><input type="color" id="stamenColor" value="#dd8844"></div>
        </div>
        <div class="flex-row">
            <div style="flex:1"><label>🌱 花種</label>
                <select id="flowerTypeSelect">
                    <option value="rose">🌹 玫瑰</option>
                    <option value="cherry">🌸 櫻花</option>
                    <option value="sunflower">🌻 向日葵</option>
                    <option value="lotus">🪷 蓮花</option>
                </select>
            </div>
            <div style="flex:1"><label>🍂 飄落數量</label><input type="number" id="petalCount" value="10" min="2" max="25"></div>
            <div style="flex:1"><label>🌬️ 飄落速度</label><input type="range" id="fallSpeed" min="0.5" max="2.5" step="0.1" value="1.2"></div>
        </div>
        <button id="savePlantAppearanceBtn" class="admin-btn">💾 儲存外觀</button>
    </div>

    <div class="admin-section">
        <div class="admin-title" style="font-size:1.2rem;">📋 玩家資料庫</div>
        <button id="exportDataBtn" class="admin-btn">📥 匯出備份</button>
        <button id="importDataBtn" class="admin-btn">📤 匯入還原</button>
        <button id="resetAllDataBtn" class="admin-btn admin-btn-danger">⚠️ 重置所有玩家</button>
        <div style="overflow-x: auto;">
            <table id="playersTable">
                <thead><tr><th>LINE ID</th><th>水滴</th><th>開花</th><th>領獎次數</th><th>最後領取</th><th>操作</th></tr></thead>
                <tbody id="playersTbody"><tr><td colspan="6">載入中...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div class="admin-section">
        <div class="admin-title" style="font-size:1.2rem;">⚙️ 遊戲數值</div>
        <div class="flex-row">
            <div style="flex:1"><label>🌸 開花門檻 (水滴)</label><input type="number" id="targetWaterSetting" value="660" step="10"></div>
            <div style="flex:1"><label>💧 日常澆水給水</label><input type="number" id="dailyWaterAmount" value="20"></div>
            <div style="flex:1"><label>📖 答題正確給水</label><input type="number" id="quizRewardAmount" value="50"></div>
        </div>
        <button id="saveGameSettingsBtn" class="admin-btn">💾 儲存設定</button>
    </div>

    <div class="admin-section">
        <div class="admin-title" style="font-size:1.2rem;">🎁 贈品兌換連結</div>
        <div class="flex-row">
            <input type="url" id="giftCouponUrl" style="flex:3;" placeholder="https://lin.ee/xxx" value="https://lin.ee/example">
            <button id="saveGiftLinkBtn" class="admin-btn">儲存連結</button>
        </div>
    </div>

    <div class="admin-section">
        <div class="admin-title" style="font-size:1.2rem;">📚 護膚題庫</div>
        <textarea id="questionsEditor" rows="8" style="width:100%;"></textarea>
        <button id="updateQuestionsBtn" class="admin-btn">✏️ 更新題庫</button>
        <button id="resetDefaultQuestions" class="admin-btn">↺ 重置預設</button>
    </div>

    <div class="admin-section">
        <div class="admin-title" style="font-size:1.2rem;">🛠️ 手動調整玩家</div>
        <div class="flex-row">
            <select id="selectPlayerForEdit" style="flex:2;"></select>
            <input type="number" id="editWaterAmount" placeholder="增加水滴" style="flex:1;">
            <button id="addWaterToPlayerBtn" class="admin-btn">➕ 增加水滴</button>
        </div>
    </div>

    <div id="adminMsg" style="background:#e6ddb3; border-radius:30px; padding:8px; margin-top:10px;"></div>
</div>

<script>
    // ✅ 正確設定 LIFF ID
    window.LIFF_ID = "2009794956-63RNhOU2";

    // 儲存KEY (與玩家頁面共用)
    const STORAGE_PLAYERS = "flower_advanced_players";
    const STORAGE_SETTINGS = "flower_advanced_settings";
    const STORAGE_PLANT_APPEARANCE = "flower_advanced_appearance";

    // 預設題庫
    const DEFAULT_QUESTION_BANK = [
        { text: "旅行時肌膚容易乾燥，哪種保養品最適合隨身攜帶？", options: ["保濕噴霧", "卸妝油", "磨砂膏", "A醇精華"], correct: 0 },
        { text: "搭飛機時，機艙乾燥，護膚重點是什麼？", options: ["加強保濕鎖水", "去角質", "使用高濃度酸類", "完全不保養"], correct: 0 },
        { text: "出國滑雪後臉頰泛紅，最適合使用哪種成分舒緩？", options: ["積雪草", "水楊酸", "酒精", "維生素C粉"], correct: 0 },
        { text: "海邊度假曬後修護，首要步驟是？", options: ["保濕鎮靜", "立即美白", "去角質", "使用果酸"], correct: 0 },
        { text: "吃太多甜食可能導致肌膚哪種問題？", options: ["糖化反應膠原蛋白流失", "變白", "減少出油", "毛孔縮小"], correct: 0 },
        { text: "補充哪種營養素有助於減少痘痘發炎？", options: ["Omega-3脂肪酸", "糖分", "飽和脂肪", "精緻澱粉"], correct: 0 },
        { text: "維生素C缺乏可能導致肌膚？", options: ["膠原蛋白合成受阻", "油脂過多", "角質增厚", "黑色素減少"], correct: 0 },
        { text: "喝足夠的水對肌膚的直接好處是？", options: ["維持角質層含水量", "減少皺紋", "美白", "緊緻毛孔"], correct: 0 },
        { text: "日常防曬最主要的目的？", options: ["防止光老化與皮膚癌", "防止出油", "防止痘痘", "保濕"], correct: 0 },
        { text: "洗臉後正確的保養順序是？", options: ["化妝水→精華→乳液", "乳液→化妝水→精華", "精華→乳液→化妝水", "隨便擦"], correct: 0 },
        { text: "換季時肌膚不穩，應該避免哪種成分？", options: ["高濃度酒精", "神經醯胺", "玻尿酸", "角鯊烷"], correct: 0 },
        { text: "冬天乾冷，保養最後一步建議使用？", options: ["乳霜/凡士林鎖水", "化妝水", "防曬", "洗面乳"], correct: 0 },
        { text: "夏天容易出油，適合的保養質地是？", options: ["凝露/凝膠", "油膏", "凡士林", "厚重乳霜"], correct: 0 },
        { text: "敏感肌在春季最需要注意？", options: ["防護花粉與空汙", "強力去角質", "使用酸類煥膚", "過度清潔"], correct: 0 },
        { text: "經常熬夜容易導致？", options: ["皮脂膜受損、暗沉", "皮膚變厚", "角質減少", "緊緻拉提"], correct: 0 },
        { text: "哪一種食物有助於提升肌膚防禦力？", options: ["富含維生素E的堅果", "炸雞", "薯條", "含糖飲料"], correct: 0 },
        { text: "抗老明星成分A醇(Retinol)使用注意事項？", options: ["需建立耐受並夜間使用", "早上使用效果佳", "可與高濃度酸類疊加", "孕婦安心用"], correct: 0 },
        { text: "防曬標示PA++++ 主要對抗？", options: ["UVA(曬黑老化)", "UVB", "紅外線", "藍光"], correct: 0 },
        { text: "『刷酸』煥膚時，不建議搭配？", options: ["高濃度去角質磨砂膏", "保濕乳液", "溫和防曬", "修護霜"], correct: 0 },
        { text: "秋季保養關鍵字是？", options: ["修復與保濕", "強力控油", "頻繁去角質", "只用水洗臉"], correct: 0 }
    ];

    let gameSettings = { targetWater: 660, dailyWaterAmount: 20, quizRewardAmount: 50, giftCouponLink: "https://lin.ee/example", questionBank: JSON.parse(JSON.stringify(DEFAULT_QUESTION_BANK)) };
    let plantAppearance = { stemColor: "#5a8f4c", leafColor: "#6fbf4c", flowerColor: "#ffaa88", stamenColor: "#dd8844", flowerType: "rose", petalCount: 10, fallSpeed: 1.2 };
    let playersMap = new Map();

    function persistAll() {
        const obj = {}; for (let [id, data] of playersMap.entries()) obj[id] = data;
        localStorage.setItem(STORAGE_PLAYERS, JSON.stringify(obj));
        localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(gameSettings));
        localStorage.setItem(STORAGE_PLANT_APPEARANCE, JSON.stringify(plantAppearance));
    }

    function loadAll() {
        const rawPlayers = localStorage.getItem(STORAGE_PLAYERS);
        if (rawPlayers) { try { const obj = JSON.parse(rawPlayers); playersMap.clear(); for (let [id, val] of Object.entries(obj)) playersMap.set(id, val); } catch(e) {} }
        const rawSettings = localStorage.getItem(STORAGE_SETTINGS);
        if (rawSettings) { try { const saved = JSON.parse(rawSettings); gameSettings = { ...gameSettings, ...saved }; if (!gameSettings.questionBank?.length) gameSettings.questionBank = [...DEFAULT_QUESTION_BANK]; } catch(e) {} }
        const rawAppearance = localStorage.getItem(STORAGE_PLANT_APPEARANCE);
        if (rawAppearance) { try { const saved = JSON.parse(rawAppearance); plantAppearance = { ...plantAppearance, ...saved }; } catch(e) {} }
        
        document.getElementById('stemColor').value = plantAppearance.stemColor;
        document.getElementById('leafColor').value = plantAppearance.leafColor;
        document.getElementById('flowerColor').value = plantAppearance.flowerColor;
        document.getElementById('stamenColor').value = plantAppearance.stamenColor;
        document.getElementById('flowerTypeSelect').value = plantAppearance.flowerType;
        document.getElementById('petalCount').value = plantAppearance.petalCount || 10;
        document.getElementById('fallSpeed').value = plantAppearance.fallSpeed || 1.2;
        document.getElementById('targetWaterSetting').value = gameSettings.targetWater;
        document.getElementById('dailyWaterAmount').value = gameSettings.dailyWaterAmount;
        document.getElementById('quizRewardAmount').value = gameSettings.quizRewardAmount;
        document.getElementById('giftCouponUrl').value = gameSettings.giftCouponLink || "";
        document.getElementById('questionsEditor').value = JSON.stringify(gameSettings.questionBank, null, 2);
        renderAdminTable(); updatePlayerSelect();
    }

    function renderAdminTable() {
        let html = '';
        for (let [id, data] of playersMap.entries()) {
            html += `<tr>
                        <td title="${escapeHtml(id)}">${escapeHtml(id).substring(0, 20)}..</td>
                        <td>${data.water || 0}</td>
                        <td>${data.hasBloomed ? '🌸開花' : '🌱未開花'}</td>
                        <td>${data.totalClaims || 0}</td>
                        <td>${data.claimHistory?.length ? data.claimHistory[data.claimHistory.length - 1].date : '無'}</td>
                        <td><button class="player-reset-btn" onclick="resetPlayer('${escapeHtml(id)}')">重置</button></td>
                    </tr>`;
        }
        document.getElementById('playersTbody').innerHTML = html || '<tr><td colspan="6">尚無玩家，請玩家透過 LIFF 連結登入</td></tr>';
    }

    window.resetPlayer = (lineId) => {
        if (playersMap.has(lineId)) {
            playersMap.delete(lineId);
            persistAll();
            renderAdminTable();
            updatePlayerSelect();
            adminMsg(`已重置玩家 ${lineId.substring(0, 12)}`, true);
        }
    };

    function updatePlayerSelect() {
        const sel = document.getElementById('selectPlayerForEdit');
        sel.innerHTML = '<option value="">-- 選擇玩家 --</option>';
        for (let [id, data] of playersMap.entries()) {
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = `${id.substring(0, 20)}... (水:${data.water || 0})`;
            sel.appendChild(opt);
        }
    }

    function adminMsg(msg, isSuccess = true) {
        const div = document.getElementById('adminMsg');
        div.innerHTML = msg;
        div.className = isSuccess ? 'success-msg' : 'error-msg';
        setTimeout(() => { if (div.innerHTML === msg) div.innerHTML = ""; }, 2500);
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    function savePlantAppearance() {
        plantAppearance.stemColor = document.getElementById('stemColor').value;
        plantAppearance.leafColor = document.getElementById('leafColor').value;
        plantAppearance.flowerColor = document.getElementById('flowerColor').value;
        plantAppearance.stamenColor = document.getElementById('stamenColor').value;
        plantAppearance.flowerType = document.getElementById('flowerTypeSelect').value;
        plantAppearance.petalCount = parseInt(document.getElementById('petalCount').value) || 10;
        plantAppearance.fallSpeed = parseFloat(document.getElementById('fallSpeed').value);
        persistAll();
        adminMsg("✅ 植物外觀已儲存");
    }

    function saveSettings() {
        gameSettings.targetWater = parseInt(document.getElementById('targetWaterSetting').value) || 660;
        gameSettings.dailyWaterAmount = parseInt(document.getElementById('dailyWaterAmount').value) || 20;
        gameSettings.quizRewardAmount = parseInt(document.getElementById('quizRewardAmount').value) || 50;
        persistAll();
        adminMsg("✅ 遊戲設定已儲存");
    }

    function saveGiftLink() {
        gameSettings.giftCouponLink = document.getElementById('giftCouponUrl').value.trim() || "https://lin.ee/example";
        persistAll();
        adminMsg("✅ 兌換連結已儲存");
    }

    function updateQuestions() {
        try {
            const newBank = JSON.parse(document.getElementById('questionsEditor').value);
            if (Array.isArray(newBank) && newBank.length) {
                gameSettings.questionBank = newBank;
                persistAll();
                adminMsg(`✅ 題庫更新成功！共 ${newBank.length} 題`);
            } else throw new Error();
        } catch (e) {
            adminMsg("❌ 題庫格式錯誤，請確認 JSON 格式正確", false);
        }
    }

    function resetDefaultQ() {
        gameSettings.questionBank = JSON.parse(JSON.stringify(DEFAULT_QUESTION_BANK));
        persistAll();
        document.getElementById('questionsEditor').value = JSON.stringify(gameSettings.questionBank, null, 2);
        adminMsg(`✅ 已重置預設題庫，共 ${DEFAULT_QUESTION_BANK.length} 題`);
    }

    function exportBackup() {
        const exportData = { players: Array.from(playersMap.entries()), settings: gameSettings, plantAppearance };
        const blob = new Blob([JSON.stringify(exportData)], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `flower_backup_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        adminMsg("📥 備份已匯出");
    }

    function importBackup(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.players) { playersMap.clear(); for (let [id, val] of data.players) playersMap.set(id, val); }
                if (data.settings) gameSettings = { ...gameSettings, ...data.settings };
                if (data.plantAppearance) plantAppearance = { ...plantAppearance, ...data.plantAppearance };
                persistAll();
                loadAll();
                adminMsg("✅ 還原成功！");
            } catch (err) { adminMsg("❌ 還原失敗，檔案格式錯誤", false); }
        };
        reader.readAsText(file);
    }

    function resetAllPlayers() {
        if (confirm("⚠️ 確定要清除所有玩家的遊戲紀錄嗎？此操作無法復原！")) {
            playersMap.clear();
            persistAll();
            renderAdminTable();
            updatePlayerSelect();
            adminMsg("⚠️ 所有玩家資料已重置");
        }
    }

    function addWaterToPlayer() {
        const selectedId = document.getElementById('selectPlayerForEdit').value;
        if (!selectedId || !playersMap.has(selectedId)) { adminMsg("請選擇玩家", false); return; }
        const addVal = parseInt(document.getElementById('editWaterAmount').value);
        if (isNaN(addVal) || addVal <= 0) { adminMsg("請輸入有效的水滴數量", false); return; }
        const player = playersMap.get(selectedId);
        if (player.hasBloomed) { adminMsg("玩家已開花，無法增加水滴（可請玩家重新栽種）", false); return; }
        player.water = (player.water || 0) + addVal;
        if (player.water >= gameSettings.targetWater) {
            player.water = gameSettings.targetWater;
            player.hasBloomed = true;
        }
        persistAll();
        renderAdminTable();
        updatePlayerSelect();
        adminMsg(`✅ 已為玩家增加 ${addVal} 滴，目前水量 ${player.water}/${gameSettings.targetWater}`);
    }

    // 事件綁定
    document.getElementById('savePlantAppearanceBtn').addEventListener('click', savePlantAppearance);
    document.getElementById('saveGameSettingsBtn').addEventListener('click', saveSettings);
    document.getElementById('saveGiftLinkBtn').addEventListener('click', saveGiftLink);
    document.getElementById('updateQuestionsBtn').addEventListener('click', updateQuestions);
    document.getElementById('resetDefaultQuestions').addEventListener('click', resetDefaultQ);
    document.getElementById('exportDataBtn').addEventListener('click', exportBackup);
    document.getElementById('resetAllDataBtn').addEventListener('click', resetAllPlayers);
    document.getElementById('addWaterToPlayerBtn').addEventListener('click', addWaterToPlayer);
    document.getElementById('importDataBtn').addEventListener('click', () => {
        let inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'application/json';
        inp.onchange = e => importBackup(e.target.files[0]);
        inp.click();
    });

    // 固定連結
    const linkEl = document.getElementById('fixedGameLink');
    linkEl.href = "https://berji2025.github.io/berjizh/";
    linkEl.innerText = "https://berji2025.github.io/berjizh/";
    document.getElementById('copyLinkBtn').onclick = () => {
        navigator.clipboard.writeText("https://berji2025.github.io/berjizh/");
        adminMsg("📋 玩家連結已複製");
    };

    loadAll();
</script>
</body>
</html>
