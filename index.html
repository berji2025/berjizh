                currentPlayerData = newPlayer;

            }
            currentLineId = realLineId;

            document.getElementById('lineBindBtn').disabled = true;
            document.getElementById('lineBindBtn').innerText = "🔗 已登入";
            updateUI();

            alert("取得LINE資料失敗，請重新登入");
